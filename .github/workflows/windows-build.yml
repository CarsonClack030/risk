name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  windows-build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend build dependencies
        run: python -m pip install -r backend/requirements-build.txt

      - name: Build Python sidecar
        run: python backend/build_sidecar.py

      - name: Build Windows NSIS installer
        run: npm run build:release:windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: risk-studio-windows
          path: |
            src-tauri/target/release/risk_studio.exe
            src-tauri/target/release/bundle/nsis/*.exe
            backend/bin/*
