name: Sync Gitee Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub Release tag to publish on Gitee
        required: true
        default: v1.1.4
        type: string
  push:
    branches:
      - "gitee-release/**"

permissions:
  contents: read

concurrency:
  group: gitee-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-gitee:
    name: Publish installers to Gitee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tooling and notes
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -n "$INPUT_TAG" ]]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="${REF_NAME#gitee-release/}"
          fi
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $release_tag" >&2
            exit 1
          fi
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Download GitHub Release installers
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release download "${{ steps.release.outputs.tag }}"
          --dir release-assets
          --pattern "*.dmg"
          --pattern "*.exe"

      - name: Publish Gitee Release
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
        run: >-
          python scripts/publish_gitee_release.py
          --tag "${{ steps.release.outputs.tag }}"
          --notes-file ".github/release-notes/${{ steps.release.outputs.tag }}.md"
          --assets-dir release-assets
