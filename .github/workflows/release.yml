name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-build.txt

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Run backend tests
        run: PYTHONPATH=backend/src python -m unittest discover -s backend/tests -v

      - name: Build frontend
        run: npm run build:web

  build-macos:
    name: Build macOS DMG
    needs: validate
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend build dependencies
        run: python -m pip install -r backend/requirements-build.txt

      - name: Build macOS package
        run: npm run build:release:dmg

      - name: Test packaged macOS backend
        run: npm run test:macos-bundle

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: risk-studio-macos-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows installer
    needs: validate
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend build dependencies
        run: python -m pip install -r backend/requirements-build.txt

      - name: Build Python sidecar
        run: python backend/build_sidecar.py

      - name: Build Windows installer
        run: npm run build:release:windows

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: risk-studio-windows-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish:
    name: Create GitHub Release
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Download macOS package
        uses: actions/download-artifact@v4
        with:
          name: risk-studio-macos-${{ github.ref_name }}
          path: release-assets

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: risk-studio-windows-${{ github.ref_name }}
          path: release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*
          --verify-tag
          --title "Risk Studio $GITHUB_REF_NAME"
          --notes-file ".github/release-notes/$GITHUB_REF_NAME.md"
